<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hayford Mensah - FCM.41.020.077.24</title>
  <script src="script/aframe.min.js"></script>
</head>
<body>

  <a-scene>

    <!-- ASSETS -->
    <a-assets>
      <img id="tex-sun" src="texture/2k_sun.jpg">
      <img id="tex-mercury" src="texture/2k_mercury.jpg">
      <img id="tex-venus" src="texture/2k_venus_atmosphere.jpg">
      <img id="tex-earth" src="texture/2k_earth_daymap.jpg">
      <img id="tex-moon" src="texture/2k_moon.jpg">
      <img id="tex-mars" src="texture/2k_mars.jpg">
      <img id="tex-jupiter" src="texture/2k_jupiter.jpg">
      <img id="tex-saturn" src="texture/2k_saturn.jpg">
      <img id="tex-saturn-ring" src="texture/2k_saturn_ring_alpha.png">
      <img id="tex-uranus" src="texture/2k_uranus.jpg">
      <img id="tex-neptune" src="texture/2k_neptune.jpg">
      <img id="tex-stars" src="texture/2k_stars_milky_way.jpg">
    </a-assets>

    <!-- CAMERA -->
    <a-entity position="0 10 90">
      <a-camera
        fov="70"
        near="0.05"
        far="2000">
      </a-camera>
    </a-entity>

    <!-- ENVIRONMENT -->
    <a-sky src="#tex-stars" radius="900" rotation="10 -35 5"></a-sky>

    <a-light type="ambient" color="#08091a" intensity="0.6"></a-light>

    <a-light
      type="point"
      color="#fff9e8"
      intensity="3.0"
      position="0 0 0"
      decay="2"
      distance="700">
    </a-light>


    <!-- SUN -->
    <a-sphere
      radius="5"
      segments-height="64" segments-width="64"
      material="src: #tex-sun; shader: flat"
      animation="property: rotation; from: 0 0 0; to: 0 360 0;
                 loop: true; dur: 25000; easing: linear">
    </a-sphere>

    <!-- TRANSPARENT SHELLS -->
    <a-sphere radius="5.6"
      material="color:#ff8800; opacity:0.09; transparent:true; shader:flat; side:back">
    </a-sphere>
    <a-sphere radius="6.5"
      material="color:#ff4400; opacity:0.04; transparent:true; shader:flat; side:back">
    </a-sphere>

    <a-entity position="0 7.5 0">
      <a-text value="SUN" align="center" color="#FFD700" width="14" billboard></a-text>
    </a-entity>


    <!-- ORBITING LINES -->
    <a-torus radius="9"  radius-tubular="0.016" segments-tubular="160" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="14" radius-tubular="0.016" segments-tubular="160" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="20" radius-tubular="0.016" segments-tubular="160" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="27" radius-tubular="0.016" segments-tubular="160" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="38" radius-tubular="0.016" segments-tubular="200" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="50" radius-tubular="0.016" segments-tubular="200" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="62" radius-tubular="0.016" segments-tubular="200" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>
    <a-torus radius="74" radius-tubular="0.016" segments-tubular="240" rotation="90 0 0"
      material="color:#aabbcc; opacity:0.13; transparent:true; shader:flat"></a-torus>


    <!-- MERCURY -->
    <a-entity
      rotation="7 0 0"
      animation="property: rotation; from: 7 0 0; to: 7 360 0;
                 loop: true; dur: 6000; easing: linear">

      <a-entity position="9 0 0">
        <a-sphere
          radius="0.38"
          segments-height="32" segments-width="32"
          material="src: #tex-mercury"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 5800; easing: linear">
        </a-sphere>
        <a-entity position="0 0.80 0">
          <a-text value="MERCURY" align="center" color="#c0c0c0" width="6" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>


    <!-- VENUS -->
    <a-entity
      rotation="3.4 0 0"
      animation="property: rotation; from: 3.4 0 0; to: 3.4 360 0;
                 loop: true; dur: 10000; easing: linear">

      <a-entity position="14 0 0">
        <a-sphere
          radius="0.88"
          segments-height="32" segments-width="32"
          material="src: #tex-venus"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 12000; easing: linear">
        </a-sphere>
        <a-entity position="0 1.35 0">
          <a-text value="VENUS" align="center" color="#ffcc88" width="6" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>


    <!-- EARTH -->
    <a-entity
      animation="property: rotation; from: 0 0 0; to: 0 360 0;
                 loop: true; dur: 15000; easing: linear">

      <a-entity position="20 0 0">
        <a-sphere
          radius="0.92"
          segments-height="48" segments-width="48"
          material="src: #tex-earth"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 8000; easing: linear">
        </a-sphere>
        <a-entity position="0 1.45 0">
          <a-text value="EARTH" align="center" color="#88aaff" width="6" billboard></a-text>
        </a-entity>

        <!-- MOON -->
        <a-entity
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 4000; easing: linear">
          <a-entity position="2.4 0.3 0">
            <a-sphere
              radius="0.26"
              segments-height="24" segments-width="24"
              material="src: #tex-moon"
              animation="property: rotation; from: 0 0 0; to: 0 360 0;
                         loop: true; dur: 4000; easing: linear">
            </a-sphere>
            <a-entity position="0 0.55 0">
              <a-text value="MOON" align="center" color="#c8c8c8" width="4" billboard></a-text>
            </a-entity>
          </a-entity>
        </a-entity>

      </a-entity>
    </a-entity>


    <!-- MARS -->
    <a-entity
      rotation="1.8 0 0"
      animation="property: rotation; from: 1.8 0 0; to: 1.8 360 0;
                 loop: true; dur: 25000; easing: linear">

      <a-entity position="27 0 0">
        <a-sphere
          radius="0.52"
          segments-height="32" segments-width="32"
          material="src: #tex-mars"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 7000; easing: linear">
        </a-sphere>
        <a-entity position="0 1.00 0">
          <a-text value="MARS" align="center" color="#ff6644" width="6" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>


    <!-- JUPITER -->
    <a-entity
      rotation="1.3 0 0"
      animation="property: rotation; from: 1.3 0 0; to: 1.3 360 0;
                 loop: true; dur: 45000; easing: linear">

      <a-entity position="38 0 0">
        <a-sphere
          radius="2.6"
          segments-height="48" segments-width="48"
          material="src: #tex-jupiter"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 4000; easing: linear">
        </a-sphere>
        <a-entity position="0 3.5 0">
          <a-text value="JUPITER" align="center" color="#cc9966" width="9" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>


    <!-- SATURN -->
    <a-entity
      rotation="2.5 0 0"
      animation="property: rotation; from: 2.5 0 0; to: 2.5 360 0;
                 loop: true; dur: 70000; easing: linear">

      <a-entity position="50 0 0">

        <a-sphere
          radius="2.2"
          segments-height="48" segments-width="48"
          material="src: #tex-saturn"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 4500; easing: linear">
        </a-sphere>

        <!-- SPHERE AROUND SATURN -->
        <a-ring
          geometry="radiusInner: 2.8; radiusOuter: 4.8; thetaSegments: 128"
          rotation="-80 0 0"
          material="src: #tex-saturn-ring;
                    transparent: true;
                    side: double;
                    alphaTest: 0.05;
                    opacity: 0.90;
                    shader: flat">
        </a-ring>

        <a-entity position="0 3.2 0">
          <a-text value="SATURN" align="center" color="#ddbb88" width="9" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>

    <!-- URANUS -->
    <a-entity
      rotation="0.8 0 0"
      animation="property: rotation; from: 0.8 0 0; to: 0.8 360 0;
                 loop: true; dur: 100000; easing: linear">

      <a-entity position="62 0 0">
        <a-sphere
          radius="1.35"
          segments-height="40" segments-width="40"
          material="src: #tex-uranus"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 6000; easing: linear">
        </a-sphere>

        <a-entity position="0 2.15 0">
          <a-text value="URANUS" align="center" color="#88ccdd" width="9" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>


    <!-- NEPTUNE -->
    <a-entity
      rotation="1.8 0 0"
      animation="property: rotation; from: 1.8 0 0; to: 1.8 360 0;
                 loop: true; dur: 140000; easing: linear">

      <a-entity position="74 0 0">
        <a-sphere
          radius="1.25"
          segments-height="40" segments-width="40"
          material="src: #tex-neptune"
          animation="property: rotation; from: 0 0 0; to: 0 360 0;
                     loop: true; dur: 6500; easing: linear">
        </a-sphere>
        <a-entity position="0 2.05 0">
          <a-text value="NEPTUNE" align="center" color="#4466ee" width="9" billboard></a-text>
        </a-entity>
      </a-entity>

    </a-entity>


  </a-scene>
</body>
</html>
